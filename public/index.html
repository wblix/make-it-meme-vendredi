<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakeMeMeme 🐸</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --yellow: #FFE93E;
      --pink: #FF5FA0;
      --cyan: #00E5FF;
      --purple: #9B5DE5;
      --green: #00F5A0;
      --orange: #FF7F11;
      --red: #FF4444;
      --bg: #1A1033;
      --card: #251848;
      --card2: #2E1F5E;
      --text: #F0E6FF;
      --subtext: #9B8EC4;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: var(--purple);
      top: -100px;
      left: -100px;
      animation: blob1 8s ease-in-out infinite alternate;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: var(--pink);
      bottom: -100px;
      right: -100px;
      animation: blob2 10s ease-in-out infinite alternate;
    }

    @keyframes blob1 {
      to {
        transform: translate(60px, 80px) scale(1.2);
      }
    }

    @keyframes blob2 {
      to {
        transform: translate(-60px, -80px) scale(1.1);
      }
    }

    .screen {
      display: none;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .screen.active {
      display: flex;
    }

    /* ===================== WELCOME ===================== */
    #screen-welcome {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px;
      text-align: center;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(3rem, 10vw, 6rem);
      background: linear-gradient(135deg, var(--yellow), var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      animation: logoPop 0.6s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    @keyframes logoPop {
      from {
        transform: scale(0.5) rotate(-5deg);
        opacity: 0;
      }

      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .tagline {
      color: var(--subtext);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .welcome-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
      animation: fadeUp 0.5s 0.2s both;
    }

    @keyframes fadeUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .input-field {
      background: var(--card);
      border: 2px solid var(--card2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .input-field::placeholder {
      color: var(--subtext);
      font-weight: 600;
    }

    .input-field:focus {
      border-color: var(--cyan);
    }

    .btn {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      padding: 14px 24px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--cyan), var(--green));
      color: var(--bg);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ===================== LOBBY ===================== */
    #screen-lobby {
      flex-direction: column;
      padding: 0;
    }

    .lobby-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 2px solid var(--card2);
      gap: 16px;
      flex-wrap: wrap;
    }

    .lobby-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lobby-user {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: 50px;
      padding: 8px 18px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      flex-shrink: 0;
    }

    .lobby-body {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      flex: 1;
      min-height: 0;
    }

    .rooms-panel {
      padding: 28px 32px;
      overflow-y: auto;
      border-right: 2px solid var(--card2);
    }

    .panel-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--cyan);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .room-card {
      background: var(--card);
      border: 2px solid var(--card2);
      border-radius: var(--radius);
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .room-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .room-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.2);
      border-color: var(--cyan);
    }

    .room-card:hover::before {
      opacity: 0.07;
    }

    .room-card>* {
      position: relative;
      z-index: 1;
    }

    .room-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      color: var(--yellow);
      margin-bottom: 8px;
    }

    .room-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 10px;
      letter-spacing: 0.05em;
    }

    .badge-players {
      background: var(--purple);
      color: #fff;
    }

    .badge-phase {
      background: var(--orange);
      color: #fff;
    }

    .badge-waiting {
      background: var(--green);
      color: var(--bg);
    }

    .empty-rooms {
      color: var(--subtext);
      font-size: 1rem;
      text-align: center;
      padding: 40px;
      grid-column: 1 / -1;
    }

    .create-panel {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ===================== GAME ===================== */
    #screen-game {
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    .game-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--card);
      border-bottom: 2px solid var(--card2);
      gap: 16px;
      flex-wrap: wrap;
    }

    .room-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card2);
      border-radius: 50px;
      padding: 6px 16px;
    }

    .room-badge-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(1.3);
      }
    }

    .phase-pill {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      border-radius: 50px;
      padding: 6px 18px;
      letter-spacing: 0.05em;
    }

    .phase-writing {
      background: var(--cyan);
      color: var(--bg);
    }

    .phase-voting {
      background: var(--yellow);
      color: var(--bg);
    }

    .phase-result {
      background: var(--green);
      color: var(--bg);
    }

    .phase-waiting {
      background: var(--card2);
      color: var(--subtext);
    }

    .game-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 20px;
      overflow-y: auto;
    }

    /* ===================== TIMER ===================== */
    .timer-wrapper {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .timer-svg {
      transform: rotate(-90deg);
      overflow: visible;
    }

    .timer-track {
      fill: none;
      stroke: var(--card2);
      stroke-width: 6;
    }

    .timer-arc {
      fill: none;
      stroke: var(--cyan);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
    }

    .timer-arc.urgent {
      stroke: var(--red);
    }

    .timer-number {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      fill: var(--text);
      text-anchor: middle;
      dominant-baseline: central;
      transition: fill 0.3s ease;
    }

    .timer-number.urgent {
      fill: var(--red);
    }

    .timer-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--subtext);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ===================== MEME & FORMS ===================== */
    .meme-container {
      background: var(--card);
      border: 3px solid var(--card2);
      border-radius: 20px;
      overflow: hidden;
      max-width: 500px;
      width: 100%;
      box-shadow: var(--shadow);
      display: none;
    }

    .meme-container img {
      width: 100%;
      display: block;
      max-height: 340px;
      object-fit: contain;
      background: #000;
    }

    .caption-form {
      width: 100%;
      max-width: 500px;
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.4s both;
    }

    .caption-hint {
      color: var(--subtext);
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
    }

    .caption-row {
      display: flex;
      gap: 10px;
    }

    .caption-row .input-field {
      flex: 1;
    }

    .captions-grid {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .caption-card {
      background: var(--card);
      border: 2px solid var(--card2);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
    }

    .caption-card.votable {
      cursor: pointer;
    }

    .caption-card.votable:hover {
      border-color: var(--yellow);
      background: #2E1F5E;
      transform: translateX(4px);
    }

    .caption-card.voted {
      border-color: var(--green);
      background: rgba(0, 245, 160, 0.1);
    }

    .caption-card.voted::after {
      content: '✓ Voté';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--green);
      font-family: 'Fredoka One', cursive;
      font-size: 0.85rem;
    }

    .waiting-msg {
      text-align: center;
      color: var(--subtext);
      font-size: 1.1rem;
      font-weight: 700;
      padding: 40px;
      animation: fadeUp 0.4s both;
    }

    .waiting-emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 12px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .result-card {
      background: var(--card);
      border: 3px solid var(--yellow);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 0 40px rgba(255, 233, 62, 0.2);
      animation: fadeUp 0.4s both;
    }

    .result-trophy {
      font-size: 3.5rem;
      margin-bottom: 8px;
    }

    .result-winner {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      color: var(--yellow);
      margin-bottom: 6px;
    }

    .result-caption {
      color: var(--subtext);
      font-style: italic;
      font-size: 1.05rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .scores-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--cyan);
      margin-bottom: 10px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--card2);
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .score-name {
      font-weight: 800;
    }

    .score-pts {
      font-family: 'Fredoka One', cursive;
      color: var(--yellow);
      font-size: 1.1rem;
    }

    /* ===================== SIDEBAR ===================== */
    .sidebar {
      width: 280px;
      background: var(--card);
      border-left: 2px solid var(--card2);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 2px solid var(--card2);
    }

    .sidebar-label {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      color: var(--subtext);
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .players-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--card2);
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .player-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .chat-msg {
      background: var(--card2);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.85rem;
      line-height: 1.4;
      word-break: break-word;
      animation: fadeUp 0.2s both;
    }

    .chat-msg strong {
      color: var(--cyan);
    }

    .chat-msg.server strong {
      color: var(--yellow);
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 2px solid var(--card2);
    }

    .chat-input-row .input-field {
      flex: 1;
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .btn-send {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 40px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .btn-send:hover {
      transform: scale(1.1);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--pink);
      color: #fff;
      border-radius: 50px;
      padding: 12px 24px;
      font-weight: 800;
      font-size: 0.95rem;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--card2);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <!-- ===================== WELCOME ===================== -->
  <div id="screen-welcome" class="screen active">
    <div class="logo">MakeMeMeme</div>
    <p class="tagline">Le jeu de mèmes</p>
    <div class="welcome-form">
      <input id="input-username" class="input-field" type="text" placeholder="Ton pseudo..." maxlength="20" autofocus>
      <button id="btn-enter" class="btn btn-primary">Entrer dans le lobby →</button>
    </div>
  </div>

  <!-- ===================== LOBBY ===================== -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-header">
      <span class="lobby-title">Lobby</span>
      <div class="lobby-user">
        <div class="avatar" id="lobby-avatar">?</div>
        <span id="lobby-username" style="font-weight:800;"></span>
      </div>
    </div>
    <div class="lobby-body">
      <div class="rooms-panel">
        <div class="panel-title">Rooms disponibles</div>
        <div class="rooms-grid" id="rooms-grid">
          <div class="empty-rooms">Aucune room pour l'instant...<br>Crées-en une !</div>
        </div>
      </div>
      <div class="create-panel">
        <div class="panel-title">Créer une room</div>
        <input id="input-roomname" class="input-field" type="text" placeholder="Nom de la room..." maxlength="24">
        <button id="btn-create-room" class="btn btn-primary">Créer et rejoindre</button>
      </div>
    </div>
  </div>

  <!-- ===================== GAME ===================== -->
  <div id="screen-game" class="screen">
    <div class="game-main">
      <div class="game-header">
        <div class="room-badge">
          <div class="room-badge-dot"></div>
          <span id="game-room-name" style="font-weight:800; font-size:0.95rem;"></span>
        </div>
        <span id="phase-pill" class="phase-pill phase-waiting">En attente...</span>

        <!-- TIMER -->
        <div class="timer-wrapper" id="timer-wrapper">
          <svg class="timer-svg" width="56" height="56" viewBox="0 0 56 56">
            <!-- Track -->
            <circle class="timer-track" cx="28" cy="28" r="22" />
            <!-- Arc -->
            <circle class="timer-arc" id="timer-arc" cx="28" cy="28" r="22" />
            <!-- Number (centre, non rotaté) -->
            <text class="timer-number" id="timer-number" x="28" y="28" transform="rotate(90, 28, 28)">30</text>
          </svg>
          <span class="timer-label" id="timer-label">SEC</span>
        </div>

        <span id="round-label" style="color:var(--subtext); font-weight:800; font-size:0.9rem;"></span>
      </div>

      <div class="game-content">
        <div id="waiting-msg" class="waiting-msg">
          <span class="waiting-emoji">⏳</span>
          En attente d'un autre joueur...
        </div>
        <div class="meme-container" id="meme-container">
          <img id="meme-img" src="" alt="Mème du round">
        </div>
        <div class="caption-form" id="caption-form">
          <p class="caption-hint">Écris la meilleure légende !</p>
          <div class="caption-row">
            <input id="caption-input" class="input-field" type="text" placeholder="Ta légende..." maxlength="120">
            <button id="btn-send-caption" class="btn btn-secondary">Envoyer</button>
          </div>
        </div>
        <div class="captions-grid" id="captions-grid"></div>
        <div class="result-card" id="result-card" style="display:none;">
          <div class="result-trophy">🏆</div>
          <div class="result-winner" id="result-winner"></div>
          <div class="result-caption" id="result-caption"></div>
          <div class="scores-title">Scores</div>
          <div id="scores-list"></div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">JOUEURS</div>
        <div class="players-list" id="players-list"></div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="input-field" type="text" placeholder="Message...">
        <button class="btn-send" id="btn-chat-send">➤</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let username = '';
    let ws;

    // ===================== TIMER =====================
    const TIMER_RADIUS = 22;
    const TIMER_CIRCUMFERENCE = 2 * Math.PI * TIMER_RADIUS; // ~138.23

    let timerInterval = null;
    let timerRemaining = 0;
    let timerTotal = 0;

    function startTimer(seconds) {
      stopTimer();

      timerRemaining = seconds;
      timerTotal = seconds;

      const wrapper = document.getElementById('timer-wrapper');
      const arc = document.getElementById('timer-arc');
      const number = document.getElementById('timer-number');

      // Init arc
      arc.style.strokeDasharray = TIMER_CIRCUMFERENCE;
      arc.style.strokeDashoffset = 0;
      arc.classList.remove('urgent');
      number.classList.remove('urgent');

      wrapper.style.display = 'flex';
      updateTimerUI();

      timerInterval = setInterval(() => {
        timerRemaining--;
        updateTimerUI();
        if (timerRemaining <= 0) stopTimer();
      }, 1000);
    }

    function updateTimerUI() {
      const arc = document.getElementById('timer-arc');
      const number = document.getElementById('timer-number');

      // Avancement : de 0 (plein) à circumference (vide)
      const progress = timerRemaining / timerTotal;
      const offset = TIMER_CIRCUMFERENCE * (1 - progress);

      arc.style.strokeDashoffset = offset;
      number.textContent = timerRemaining;

      // Urgence sous 5s
      const urgent = timerRemaining <= 5;
      arc.classList.toggle('urgent', urgent);
      number.classList.toggle('urgent', urgent);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function hideTimer() {
      stopTimer();
      document.getElementById('timer-wrapper').style.display = 'none';
    }

    // ===================== HELPERS =====================
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function addChatMsg(from, message, isServer = false) {
      const div = document.createElement('div');
      div.className = 'chat-msg' + (isServer ? ' server' : '');
      div.innerHTML = `<strong>${from}:</strong> ${message}`;
      const chat = document.getElementById('chat-messages');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // ===================== WELCOME =====================
    document.getElementById('btn-enter').onclick = () => {
      const val = document.getElementById('input-username').value.trim();
      if (!val) { showToast('Entre un pseudo !'); return; }
      username = val;
      connectWS();
    };
    document.getElementById('input-username').onkeydown = (e) => {
      if (e.key === 'Enter') document.getElementById('btn-enter').click();
    };

    // ===================== WEBSOCKET =====================
    function connectWS() {
      // En prod (Docker) : passe par Nginx /ws
      // En dev local : ws://localhost:8080
      const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
      const wsUrl = `${wsProto}://${location.host}/ws`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'get_lobby', username }));
        document.getElementById('lobby-username').textContent = username;
        document.getElementById('lobby-avatar').textContent = username[0].toUpperCase();
        showScreen('screen-lobby');
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        switch (data.type) {
          case 'lobby': renderLobby(data.rooms); break;
          case 'room_joined':
            document.getElementById('game-room-name').textContent = data.room;
            showScreen('screen-game');
            break;
          case 'users': renderPlayers(data.users); break;
          case 'message': addChatMsg(data.from, data.message, data.from === 'Serveur'); break;
          case 'error': showToast(data.message); break;
          case 'game_update': handleGameUpdate(data); break;
        }
      };

      ws.onerror = () => showToast('Erreur de connexion au serveur.');
      ws.onclose = () => showToast('Déconnecté du serveur.');
    }

    // ===================== LOBBY =====================
    function renderLobby(rooms) {
      const grid = document.getElementById('rooms-grid');
      grid.innerHTML = '';

      if (!rooms || rooms.length === 0) {
        grid.innerHTML = '<div class="empty-rooms">Aucune room pour l\'instant...<br>Crées-en une !</div>';
        return;
      }

      rooms.forEach(room => {
        const phaseLabel = { waiting: 'En attente', writing: 'Écriture', voting: 'Vote', result: 'Résultats' }[room.phase] || room.phase;
        const phaseClass = room.phase === 'waiting' ? 'badge-waiting' : 'badge-phase';
        const card = document.createElement('div');
        card.className = 'room-card';
        card.innerHTML = `
      <div class="room-name">${room.name}</div>
      <div class="room-meta">
        <span class="badge badge-players">${room.players} joueur(s)</span>
        <span class="badge ${phaseClass}">${phaseLabel}</span>
      </div>
    `;
        card.onclick = () => ws.send(JSON.stringify({ type: 'join_room', roomName: room.name }));
        grid.appendChild(card);
      });
    }

    document.getElementById('btn-create-room').onclick = () => {
      const name = document.getElementById('input-roomname').value.trim();
      if (!name) { showToast('Donne un nom à ta room !'); return; }
      ws.send(JSON.stringify({ type: 'create_room', roomName: name }));
      document.getElementById('input-roomname').value = '';
    };
    document.getElementById('input-roomname').onkeydown = (e) => {
      if (e.key === 'Enter') document.getElementById('btn-create-room').click();
    };

    // ===================== PLAYERS =====================
    function renderPlayers(users) {
      document.getElementById('players-list').innerHTML = users.map(u => `
    <div class="player-row"><div class="player-dot"></div>${u}</div>
  `).join('');
    }

    // ===================== GAME UPDATE =====================
    function handleGameUpdate(data) {
      const phasePill = document.getElementById('phase-pill');
      const roundLabel = document.getElementById('round-label');
      const memeContainer = document.getElementById('meme-container');
      const memeImg = document.getElementById('meme-img');
      const captionForm = document.getElementById('caption-form');
      const captionsGrid = document.getElementById('captions-grid');
      const waitingMsg = document.getElementById('waiting-msg');
      const resultCard = document.getElementById('result-card');

      waitingMsg.style.display = 'none';
      resultCard.style.display = 'none';
      captionsGrid.innerHTML = '';

      if (data.round) roundLabel.textContent = `Round ${data.round}`;

      // ---- WRITING ----
      if (data.phase === 'writing') {
        phasePill.className = 'phase-pill phase-writing';
        phasePill.textContent = 'Écriture';

        memeImg.src = data.image;
        memeContainer.style.display = 'block';
        captionForm.style.display = 'flex';

        document.getElementById('caption-input').value = '';
        document.getElementById('btn-send-caption').disabled = false;
        document.getElementById('caption-input').disabled = false;
        const sent = captionForm.querySelector('.sent-msg');
        if (sent) sent.remove();

        // Timer 30s
        document.getElementById('timer-label').textContent = 'ÉCRITURE';
        startTimer(30);
      }

      // ---- VOTING ----
      if (data.phase === 'voting') {
        phasePill.className = 'phase-pill phase-voting';
        phasePill.textContent = 'Vote';

        memeImg.src = data.image;
        memeContainer.style.display = 'block';
        captionForm.style.display = 'none';

        if (data.captions) {
          for (const [rid, text] of Object.entries(data.captions)) {
            const card = document.createElement('div');
            card.className = 'caption-card votable';
            card.textContent = text;
            card.dataset.rid = rid;
            card.onclick = () => {
              ws.send(JSON.stringify({ type: 'vote', voteFor: rid }));
              card.classList.replace('votable', 'voted');
              document.querySelectorAll('.caption-card.votable').forEach(c => {
                c.classList.remove('votable');
                c.onclick = null;
              });
            };
            captionsGrid.appendChild(card);
          }
        }

        // Timer 20s
        document.getElementById('timer-label').textContent = 'VOTE';
        startTimer(20);
      }

      // ---- RESULT ----
      if (data.phase === 'result') {
        phasePill.className = 'phase-pill phase-result';
        phasePill.textContent = 'Résultats';

        memeContainer.style.display = 'none';
        captionForm.style.display = 'none';
        resultCard.style.display = 'block';

        document.getElementById('result-winner').textContent = data.winner;
        document.getElementById('result-caption').textContent = `"${data.caption}"`;

        document.getElementById('scores-list').innerHTML = Object.entries(data.scores || {})
          .sort(([, a], [, b]) => b - a)
          .map(([name, pts], i) => `
        <div class="score-row">
          <span class="score-name">${i === 0 ? '👑 ' : ''}${name}</span>
          <span class="score-pts">${pts} pt${pts > 1 ? 's' : ''}</span>
        </div>
      `).join('');

        // Pas de timer sur l'écran résultat
        hideTimer();
      }
    }

    // ===================== CHAT =====================
    document.getElementById('btn-chat-send').onclick = sendChat;
    document.getElementById('chat-input').onkeydown = (e) => { if (e.key === 'Enter') sendChat(); };
    function sendChat() {
      const msg = document.getElementById('chat-input').value.trim();
      if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'message', message: msg }));
      document.getElementById('chat-input').value = '';
    }

    // ===================== CAPTION =====================
    document.getElementById('btn-send-caption').onclick = sendCaption;
    document.getElementById('caption-input').onkeydown = (e) => { if (e.key === 'Enter') sendCaption(); };
    function sendCaption() {
      const val = document.getElementById('caption-input').value.trim();
      if (!val || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'caption', caption: val }));
      document.getElementById('caption-input').value = '';
      document.getElementById('btn-send-caption').disabled = true;
      document.getElementById('caption-input').disabled = true;
      const form = document.getElementById('caption-form');
      if (!form.querySelector('.sent-msg')) {
        const msg = document.createElement('p');
        msg.className = 'sent-msg caption-hint';
        msg.textContent = 'Légende envoyée !';
        form.appendChild(msg);
      }
    }
  </script>
</body>

</html>
