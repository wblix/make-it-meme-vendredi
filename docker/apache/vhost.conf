<VirtualHost *:80>
    DocumentRoot /usr/local/apache2/htdocs

    # ── Proxy WebSocket → conteneur websocket:8080 ──────────────────────────
    ProxyRequests Off

    # Important : upgrader les connexions WS avant le proxy HTTP classique
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /ws(.*) ws://websocket:8080/$1 [P,L]

    # Fallback HTTP (ne devrait pas arriver mais au cas où)
    ProxyPass        /ws http://websocket:8080/
    ProxyPassReverse /ws http://websocket:8080/

    # ── Fichiers statiques ───────────────────────────────────────────────────
    <Directory /usr/local/apache2/htdocs>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

</VirtualHost>
